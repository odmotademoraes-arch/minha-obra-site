name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy all edge functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy notificar-novo-cliente  --project-ref nylhawkjfbbeoqbmczmm
          supabase functions deploy notificar-cliente-ativo --project-ref nylhawkjfbbeoqbmczmm
          supabase functions deploy enviar-convite          --project-ref nylhawkjfbbeoqbmczmm
          supabase functions deploy notificar-dono-aceite   --project-ref nylhawkjfbbeoqbmczmm
